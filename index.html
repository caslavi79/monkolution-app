// ── DB WRITE HELPER ──────────────────────────────────────────────────────────
// Wraps every Supabase mutation. If the DB rejects a write (RLS, missing col,
// wrong type, etc.) the error prints to console with full context instead of
// disappearing silently. Open DevTools → Console to see any failures.
function dbWrite(promise, label) {
  Promise.resolve(promise).then(function(r) {
    if (r && r.error) {
      console.error(
        '[DB WRITE FAILED] ' + (label||'unknown') + '\n' +
        '  message: ' + r.error.message + '\n' +
        '  code:    ' + r.error.code + '\n' +
        '  hint:    ' + (r.error.hint||'none') + '\n' +
        '  details: ' + (r.error.details||'none')
      );
    }
  }).catch(function(e) {
    console.error('[DB WRITE EXCEPTION] ' + (label||'unknown') + ':', e.message);
  });
}

async function aiCoach(action, extra) {
  try {
    var session = (await sb.auth.getSession()).data.session;
    if (!session) return { error: "not_authenticated" };
    var today = _today();
    var now = new Date();
    var context = {};

    if (action === "smart_nudge") {
      var habits = getH().filter(function(h){ return h.active && h.freq === "daily"; });
      var comps = getC().filter(function(c){ return c.d === today; });
      var doneIds = comps.map(function(c){ return c.hid; });
      context = {
        hour: now.getHours(),
        done: habits.filter(function(h){ return doneIds.includes(h.id); }).length,
        total: habits.length,
        streak: getDaysWonStreak(),
        atRisk: getDaysWonStreak() > 0 && habits.filter(function(h){ return doneIds.includes(h.id); }).length < habits.length * 0.5,
        overdueTasks: getT().filter(function(t){ return t.status !== "done" && t.due && t.due < today; }).length,
        remaining: habits.filter(function(h){ return !doneIds.includes(h.id); }).map(function(h){ return { name: h.name }; })
      };
    } else if (action === "daily_plan") {
      var dHabits = getH().filter(function(h){ return h.active; });
      var dComps = getC().filter(function(c){ return c.d === today; });
      var dDoneIds = dComps.map(function(c){ return c.hid; });
      var dayNames = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
      context = {
        today: today, dayName: dayNames[now.getDay()], hour: now.getHours(),
        xp: totalXP(), level: getEffectiveLv(totalXP()).level.name, streak: getDaysWonStreak(),
        habits: dHabits.map(function(h){ return { icon: h.icon, name: h.name, freq: h.freq || "daily", target: h.freq === "weekly" ? (h.target || 3) : null, diff: h.diff, done: dDoneIds.includes(h.id), streak: getStreak ? getStreak(h.id) : 0 }; }),
        tasks: getT().filter(function(t){ return t.status !== "done"; }).sort(function(a,b){ var p={urgent:0,high:1,medium:2,low:3}; return (p[a.pri]||2)-(p[b.pri]||2); }).slice(0,15).map(function(t){ return { title: t.title, pri: t.pri, due: t.due, doDate: t.doDate }; }),
        monthlyIncome: getI().reduce(function(a,i){ return a+i.amt; },0),
        monthlyExpenses: getE().reduce(function(a,e){ return a+e.amt; },0),
        totalDebt: getD().reduce(function(a,d){ return a+d.bal; },0)
      };
    } else if (action === "habit_suggestions") {
      var allH = getH();
      var active = allH.filter(function(h){ return h.active; });
      var inactive = allH.filter(function(h){ return !h.active; });
      var allComps = getC();
      var thirtyAgo = new Date(); thirtyAgo.setDate(thirtyAgo.getDate()-30);
      var thirtyAgoStr = _ds(thirtyAgo);
      var recentComps = allComps.filter(function(c){ return c.d >= thirtyAgoStr; });
      context = {
        habits: active.map(function(h){
          var hComps = recentComps.filter(function(c){ return c.hid === h.id; }).length;
          var expected = h.freq === "daily" ? 30 : h.freq === "weekly" ? 4 : 1;
          return { icon: h.icon, name: h.name, diff: h.diff, freq: h.freq, rate: Math.round(hComps/expected*100), streak: 0 };
        }),
        inactive: inactive.map(function(h){ return { name: h.name }; }),
        daysWon: 0, totalCompletions: recentComps.length,
        level: getEffectiveLv(totalXP()).level.name, xp: totalXP()
      };
    } else if (action === "weekly_review") {
      var weekStart = new Date(); weekStart.setDate(weekStart.getDate()-7);
      var wsStr = _ds(weekStart);
      var weekComps = getC().filter(function(c){ return c.d >= wsStr; });
      var weekTasks = getT().filter(function(t){ return t.status === "done" && t.completedDate && t.completedDate >= wsStr; });
      var activeH = getH().filter(function(h){ return h.active; });
      context = {
        weekStart: wsStr, weekEnd: today,
        daysWon: 0, habitCompletions: weekComps.length, tasksCompleted: weekTasks.length,
        xpEarned: weekComps.reduce(function(a,c){ return a+(c.xp||0); },0),
        streak: getDaysWonStreak(), xp: totalXP(), level: getEffectiveLv(totalXP()).level.name,
        habitBreakdown: activeH.slice(0,10).map(function(h){
          var c = weekComps.filter(function(x){ return x.hid === h.id; }).length;
          var exp = h.freq === "daily" ? 7 : h.freq === "weekly" ? 1 : 0;
          return { icon: h.icon, name: h.name, completed: c, expected: exp, rate: exp > 0 ? Math.round(c/exp*100) : 0 };
        }),
        monthlyIncome: getI().reduce(function(a,i){ return a+i.amt; },0),
        monthlyExpenses: getE().reduce(function(a,e){ return a+e.amt; },0),
        cashflow: getI().reduce(function(a,i){ return a+i.amt; },0) - getE().reduce(function(a,e){ return a+e.amt; },0),
        totalDebt: getD().reduce(function(a,d){ return a+d.bal; },0),
        debtPayments: getDP().filter(function(p){ return p.d >= wsStr; }).reduce(function(a,p){ return a+p.amt; },0)
      };
    } else if (action === "parse_task") {
      var tom = new Date(); tom.setDate(tom.getDate()+1);
      context = {
        today: today, tomorrow: _ds(tom),
        projects: getPj().map(function(p){ return { id: p.id, name: p.name }; }),
        input: extra && extra.input || ""
      };
    } else if (action === "cashflow_forecast") {
      var incTotal = getI().reduce(function(a,i){ return a+i.amt; },0);
      var expTotal = getE().reduce(function(a,e){ return a+e.amt; },0);
      var cf = incTotal - expTotal;
      var debts = getD();
      // Simple projections
      var debtTotal = debts.reduce(function(a,d){ return a+d.bal; },0);
      var monthlyDebtPay = debts.reduce(function(a,d){ return a+(d.monthlyGoal||0); },0);
      context = {
        monthlyIncome: incTotal, monthlyExpenses: expTotal, cashflow: cf,
        debts: debts.map(function(d){ return { name: d.name, balance: d.bal, apr: d.apr, monthlyGoal: d.monthlyGoal }; }),
        proj30: Math.round(cf), proj60: Math.round(cf*2), proj90: Math.round(cf*3),
        debtFreeDate: monthlyDebtPay > 0 && debtTotal > 0 ? Math.ceil(debtTotal/monthlyDebtPay) + " months" : null
      };
    }

    if (extra) Object.assign(context, extra);

    var res = await sb.functions.invoke("ai-coach", {
      body: { action: action, context: context }
    });
    if (res.error) return { error: res.error.message || "AI request failed" };
    return res.data || { error: "Empty response" };
  } catch (e) {
    console.error("[Master Li error]", e);
    return { error: e.message || "AI unavailable" };
  }
}

function getH() { return [...STORE.habits].sort(function(a,b){return (a.order||0)-(b.order||0);}); }

function addH(d) {
  var n={id:_id(),user_id:STORE.uid,name:d.name,icon:d.icon||'💪',color:d.color||'#4ADE80',diff:d.diff||1,freq:d.freq||'daily',target:d.target||1,active:true,order:STORE.habits.length,schedTime:d.schedTime||null,schedDow:d.schedDow!=null?d.schedDow:null,schedDom:d.schedDom||null};
  STORE.habits=[...STORE.habits,n]; dbWrite(sb.from('habits').insert(n), 'addH');
}
function updH(id,u) {
  STORE.habits=STORE.habits.map(function(h){return h.id===id?Object.assign({},h,u):h;});
  dbWrite(sb.from('habits').update(u).eq('id',id), 'updH');
}
function delH(id) {
  STORE.habits=STORE.habits.filter(function(h){return h.id!==id;});
  dbWrite(sb.from('habits').delete().eq('id',id), 'delH');
}
function moveH(id,dir) {
  var habits=STORE.habits.map(function(h,i){return h.order===undefined?Object.assign({},h,{order:i}):h;});
  habits.sort(function(a,b){return (a.order||0)-(b.order||0);});
  var idx=habits.findIndex(function(h){return h.id===id;});
  var si=idx+dir;
  if(si<0||si>=habits.length) return;
  var tmp=habits[idx].order;
  habits[idx]   =Object.assign({},habits[idx],   {order:habits[si].order});
  habits[si]    =Object.assign({},habits[si],    {order:tmp});
  STORE.habits=habits;
  dbWrite(sb.from('habits').update({order:habits[idx].order}).eq('id',habits[idx].id), 'moveH-a');
  dbWrite(sb.from('habits').update({order:habits[si].order}).eq('id',habits[si].id), 'moveH-b');
}

function periodCount(hid,freq) {
  var cs=STORE.completions.filter(function(c){return c.hid===hid;});
  if(freq==='daily') return cs.filter(function(c){return c.d===_today();}).length;
  if(freq==='weekly'){var now=new Date(),day=now.getDay(),start=new Date(now);start.setDate(now.getDate()-day);var end=new Date(start);end.setDate(start.getDate()+7);var ss=_ds(start),es=_ds(end);return cs.filter(function(c){return c.d>=ss&&c.d<es;}).length;}
  if(freq==='monthly'){var m=_month();return cs.filter(function(c){return c.d.substring(0,7)===m;}).length;}
  return 0;
}
function getStreak(hid) {
  var cs=STORE.completions.filter(function(c){return c.hid===hid;}).map(function(c){return c.d;}).sort().reverse();
  if(!cs.length) return 0;
  var s=0,d=new Date(_today());
  for(var i=0;i<400;i++){var ds=_ds(d);if(cs.includes(ds)){s++;d.setDate(d.getDate()-1);}else if(i===0){d.setDate(d.getDate()-1);}else break;}
  return s;
}
function getWeeklyStreak(hid,target) {
  var cs=STORE.completions.filter(function(c){return c.hid===hid;});
  var streak=0,now=new Date();
  for(var i=1;i<=52;i++){var wStart=new Date(now);wStart.setDate(now.getDate()-now.getDay()-(i-1)*7);wStart.setHours(0,0,0,0);var wEnd=new Date(wStart);wEnd.setDate(wStart.getDate()+7);var ss=_ds(wStart),es=_ds(wEnd);var count=cs.filter(function(c){return c.d>=ss&&c.d<es;}).length;if(count>=target)streak++;else break;}
  return streak;
}

function isDayWon(ds,dailyHabits,comps) {
  if(!dailyHabits.length) return false;
  var ids=dailyHabits.map(function(h){return h.id;});
  var totalPossibleXP=dailyHabits.reduce(function(a,h){return a+DIFF[h.diff].xp;},0);
  var minH=Math.max(1,Math.ceil(dailyHabits.length*0.8));
  var minXP=Math.min(50,totalPossibleXP);
  var dc=comps.filter(function(c){return c.d===ds&&ids.includes(c.hid);});

// Count consecutive days (going back from yesterday) with zero habit completions
// Regression triggers — any ONE of these fires regression immediately:
//   • 1 day with 0% completion (full day of no interaction)
//   • 2 consecutive days below 50%
//   • 3 consecutive days below 100%
//
// Once triggered, regression is active until today has at least one habit completed.
// Penalty depth scales with how many days since last good day:
//   days in regression 1–6  → drop 1 tier
//   days in regression 7+   → drop 2 tiers
function getRegressionState() {
  var cs = getC();
  var habits = getH().filter(function (h) {
    return h.active && h.freq === "daily";
  });
  if (!habits.length || !cs.length) return {
    triggered: false,
    reason: "",
    daysIn: 0
  };
  var earliestComp = cs.map(function (c) {
    return c.d;
  }).sort()[0];

  // Check if already recovered today
  var todayDs = _ds(new Date());
  var todayComps = cs.filter(function (c) {
    return c.d === todayDs && habits.find(function (h) {
      return h.id === c.hid;
    });
  });
  if (todayComps.length > 0) return {
    triggered: false,
    reason: "",
    daysIn: 0
  };

  // Walk backwards from yesterday, collecting per-day pct
  var days = [];
  var d = new Date();
  d.setDate(d.getDate() - 1);
  for (var i = 0; i < 30; i++) {
    var ds = _ds(d);
    if (ds < earliestComp) break;
    var dayComps = cs.filter(function (c) {
      return c.d === ds && habits.find(function (h) {
        return h.id === c.hid;
      });
    });
    var pct = dayComps.length / habits.length;
    days.push({
      ds: ds,
      pct: pct
    });
    // Stop as soon as we hit a 100% day — that's the last "good" anchor
    if (pct >= 1.0) break;
    d.setDate(d.getDate() - 1);
  }
  if (!days.length) return {
    triggered: false,
    reason: "",
    daysIn: 0
  };

  // Count consecutive bad days (everything before the first 100% day)
  var badDays = days.filter(function (day) {
    return day.pct < 1.0;
  });
  var zeroCount = 0; // days with 0% (no interaction)
  var sub50Count = 0; // days below 50%
  var sub100Count = badDays.length; // all bad days

  for (var j = 0; j < badDays.length; j++) {
    if (badDays[j].pct === 0) zeroCount++;
    if (badDays[j].pct < 0.5) sub50Count++;
  }
  var triggered = false;
  var reason = "";
  if (zeroCount >= 1) {
    triggered = true;
    reason = "full day with no activity";
  } else if (sub50Count >= 2) {
    triggered = true;
    reason = sub50Count + " days below 50%";
  } else if (sub100Count >= 3) {
    triggered = true;
    reason = sub100Count + " days below 100%";
  }
  return {
    triggered: triggered,
    reason: reason,
    daysIn: triggered ? sub100Count : 0
  };
}
function getEffectiveLv(xp) {
  var earned = getLv(xp);
  var idx = EVO.findIndex(function (l) {
    return l.name === earned.name;
  });
  var state = getRegressionState();
  var penalty = !state.triggered ? 0 : state.daysIn >= 7 ? 2 : 1;
  var effectiveIdx = Math.max(0, idx - penalty);
  return {
    level: EVO[effectiveIdx],
    penalty: penalty,
    warning: false,
    score: state.daysIn,
    reason: state.reason,
    earned: earned
  };
}
